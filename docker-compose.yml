version: "3.8"

services:
  postgres:
    image: postgres:16
    container_name: email_postgres
    environment:
      POSTGRES_DB: email_orchestration
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: email_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  celery-worker:
    build: ./backend
    container_name: email_celery_worker
    command: celery -A app.celery_app.celery_config worker --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

  celery-beat:
    build: ./backend
    container_name: email_celery_beat
    command: celery -A app.celery_app.celery_config beat --loglevel=info
    env_file:
      - ./backend/.env
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
  redis_data:
